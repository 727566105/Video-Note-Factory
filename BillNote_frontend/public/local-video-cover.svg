<svg xmlns="http://www.w3.org/2000/svg" width="480" height="360" viewBox="0 0 480 360">
  <rect width="480" height="360" rx="12" fill="#F8F9FA"/>
  <rect x="16" y="16" width="448" height="328" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Folder back -->
  <path d="M160 130 L220 130 L240 110 L360 110 L360 280 L120 280 L120 130 Z" fill="#FFD569" opacity="0.3"/>
  <!-- Folder front -->
  <path d="M120 160 L360 160 L360 280 L120 280 Z" fill="#FFC225" rx="4"/>
